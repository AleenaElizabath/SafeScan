name: safescan
description: A Flutter application for pesticide and plant health analysis.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  image_picker: ^1.0.0
  easy_localization: ^3.0.0
  flutter_localizations:
    sdk: flutter
  shared_preferences: ^2.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  flutter_launcher_icons: ^0.13.1

flutter_icons:
  android: true
  ios: true
  image_path: "assets/safescan2.png"

flutter:
  uses-material-design: true

  assets:
    - assets/translations/
    - assets/bg1.jpg

